name: GitHub Issue to Support

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  create-ticket:
    runs-on: ubuntu-latest

    steps:
      - name: Create Support ticket
        env:
          FRESHDESK_DOMAIN: ${{ secrets.FRESHDESK_DOMAIN }}
          FRESHDESK_API_KEY: ${{ secrets.FRESHDESK_API_KEY }}
          FRESHDESK_REQUESTER_EMAIL: ${{ secrets.FRESHDESK_REQUESTER_EMAIL }}
          FRESHDESK_TICKET_TYPE: ${{ secrets.FRESHDESK_TICKET_TYPE }}
          FRESHDESK_TICKET_GROUP: ${{ secrets.FRESHDESK_TICKET_GROUP }}
        run: |
          curl --fail --silent --show-error \
            -u "${FRESHDESK_API_KEY}:X" \
            -H "Content-Type: application/json" \
            -X POST "https://${FRESHDESK_DOMAIN}/api/v2/tickets" \
            -o response.json \
            -d @- <<EOF
          {
            "email": "${FRESHDESK_REQUESTER_EMAIL}",
            "subject": "[GitHub][${{ github.repository }}] ${{ github.event.issue.title }} (#${{ github.event.issue.number }})",
            "description": "Repository: ${{ github.repository }}<br>Issue: <a href='${{ github.event.issue.html_url }}'>#${{ github.event.issue.number }}</a><br>Opened by: ${{ github.event.issue.user.login }}<br><br>${{ github.event.issue.body }}",
            "status": 2,
            "priority": 1,
            "type": "${FRESHDESK_TICKET_TYPE}",
            "group_id": ${FRESHDESK_TICKET_GROUP}
          }
          EOF

      - name: Comment Support ticket ID back to issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const response = JSON.parse(fs.readFileSync('response.json', 'utf8'));

            const ticketId = response.id;
            const ticketUrl = response.url;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `Support ticket created: #${ticketId}${ticketUrl ? `\n${ticketUrl}` : ''}`
            });
